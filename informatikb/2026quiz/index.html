<html>


<script>
let point=0;

  
function minquiz()
{
let sprg1=prompt("Hvilken nationalitet/land forbindes ofte med Dragør?")
if(sprg1=="Holland")
{
point=point+10;
  
}
let sprg2=prompt("Hvilken farve forbindes ofte med Dragør?")
if(sprg2=="gul")
{
point=point+10;
  
}
let sprg3=prompt("Hvilken job forbindes ofte med Dragør Havn?")
if(sprg3=="lods")
{
point=point+10;
  
}
document.getElementById("sprg").innerHTML="Resultat: "+point+" points";
  
}

  

  
</script>

<h1>Velkommen til Quizzen om Hollændergårdene</h1>
<p>
  
</p>
<button onclick="minquiz()">Start</button>
  
<div id="sprg"></div>

  

  
</html>
