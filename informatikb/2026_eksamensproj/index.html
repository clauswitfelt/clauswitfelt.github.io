<p>

<div id="mitlink">...</div>


<p>Selected Index: <span id="result">0</span></p>

<script>
  const menu = document.getElementById('myMenu');
  const resultDisplay = document.getElementById('result');

  // Listen for changes
  menu.addEventListener('change', () => {
    // Get the index
    const index = menu.selectedIndex;
    
    // Output the result
    resultDisplay.textContent = index;
    console.log("The selected index is:", index);
    let minval="https://api.thingspeak.com/update?api_key=MWOW2BT6UX1MK4R6&field1="+index;
    window.open(minval);
  
  
    
  });
</script>
