<h1>Demo af afstemningsapps i THINKSPEAK</h1>
<p></p>
<!-- The Form -->
<form id="menuForm">
  <label for="myMenu">STEM:</label>
  <select id="myMenu">
    <option>Socialdemokratiet</option>
    <option>Radikale Venstre</option>
    <option>Konservative</option>
  </select>
</form>




<p>Selected Index: <span id="result">0</span></p>

<script>
  const menu = document.getElementById('myMenu');
  const resultDisplay = document.getElementById('result');

  // Listen for changes
  menu.addEventListener('change', () => {
    // Get the index
    const index = menu.selectedIndex;
    
    // Output the result
    resultDisplay.textContent = index;
    console.log("The selected index is:", index);


    



    
  });
</script>
